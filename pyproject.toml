[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "cf-support"
dynamic = ["version"]
description = "A tool for collecting support data for Codefresh."
authors = [
    { name = "Codefresh Support (Octopus)", email = "support@codefresh.io" }
]

license = "MIT"
license-files = ["LICEN[CS]E*"]
requires-python = ">=3.10.0"

dependencies = [
    "kubernetes==32.0.1",
    "PyYAML==6.0.2",
    "requests==2.32.3",
    "click==8.1.8"
]

[project.scripts]
cf-support = "cli:cli"

[tool.setuptools.packages.find]
where = ["cf_support"]

[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "dirty-tag"
